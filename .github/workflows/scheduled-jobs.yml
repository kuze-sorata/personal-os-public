name: Personal OS Scheduled Jobs

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: "Run a public mock demo job manually"
        required: true
        default: morning
        type: choice
        options:
          - morning
          - night

jobs:
  morning:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'morning'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning job
        env:
          USE_MOCK_DATA: "true"
          MOCK_TODAY_DATE: "2026-04-05"
          MOCK_DATA_DIR: "mock_data"
          DAY_START: "08:00"
          DAY_END: "22:00"
          MIN_BLOCK_MINUTES: "20"
          BUFFER_MINUTES: "15"
          TIMEZONE: "Asia/Tokyo"
        run: python scripts/run_morning_job.py

  night:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'night'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run night job
        env:
          USE_MOCK_DATA: "true"
          MOCK_TODAY_DATE: "2026-04-05"
          MOCK_DATA_DIR: "mock_data"
          DAY_START: "08:00"
          DAY_END: "22:00"
          MIN_BLOCK_MINUTES: "20"
          BUFFER_MINUTES: "15"
          TIMEZONE: "Asia/Tokyo"
        run: python scripts/run_night_job.py
